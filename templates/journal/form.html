{% extends "base.html" %}
{% block title %}{{ _('Запись в журнал') }} — {{ project.code }}{% endblock %}

{% block content %}
<h2 class="ui header">
  {{ _('Запись в журнал') }}
  <div class="sub header">{{ _('Проект') }}: {{ project.code }}</div>
</h2>

<form class="ui form" method="post">
  <div class="ui segment">
    <div class="two fields">
      <div class="field">
        <label>{{ _('Дата') }} *</label>
        <input type="date" name="entry_date">
      </div>
      <div class="field">
        <label>{{ _('Тип') }} *</label>
        <select class="ui dropdown" name="kind">
          <option value="meeting">{{ _('Встреча') }}</option>
          <option value="call">{{ _('Звонок') }}</option>
          <option value="email">{{ _('Письмо') }}</option>
          <option value="note">{{ _('Заметка') }}</option>
          <option value="milestone">{{ _('Веха') }}</option>
          <option value="decision">{{ _('Решение') }}</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>{{ _('Заголовок') }} *</label>
      <input type="text" name="title" placeholder="{{ _('Краткое описание события') }}">
    </div>
    <div class="field">
      <label>{{ _('Содержание') }}</label>
      <textarea name="body" rows="4"></textarea>
    </div>
    <div class="two fields">
      <div class="field">
        <label>{{ _('Принятое решение') }}</label>
        <input type="text" name="decision_made">
      </div>
      <div class="field">
        <label>{{ _('Результат') }}</label>
        <input type="text" name="outcome">
      </div>
    </div>
    {% if linked_acts %}
    <div class="field">
      <label>{{ _('Связанные акты') }}</label>
      <select class="ui dropdown" name="linked_act_ids" multiple="">
        {% for a in linked_acts %}
        <option value="{{ a.id }}">{{ a.act_number }}</option>
        {% endfor %}
      </select>
    </div>
    {% endif %}
  </div>
  <button class="ui primary button" type="submit">{{ _('Добавить запись') }}</button>
  <a href="/projects/{{ project.id }}" class="ui button">{{ _('Отмена') }}</a>
</form>
{% endblock %}
