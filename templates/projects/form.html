{% extends "base.html" %}
{% block title %}{{ _('Новый проект') }}{% endblock %}

{% block content %}
<h2 class="ui header">{{ _('Новый проект') }}</h2>

<form class="ui form" method="post">
  <div class="ui segment">
    <div class="two fields">
      <div class="field">
        <label>{{ _('Контрагент') }} *</label>
        <select class="ui search dropdown" name="counterparty_id">
          <option value="">{{ _('Выберите...') }}</option>
          {% for cp in counterparties %}
          <option value="{{ cp.id }}">{{ cp.full_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label>{{ _('Код проекта') }} *</label>
        <input type="text" name="code" placeholder="ALPHA-DEV-2026">
      </div>
    </div>
    <div class="field">
      <label>{{ _('Название') }} *</label>
      <input type="text" name="name" placeholder="{{ _('Разработка платформы актов') }}">
    </div>
    <div class="field">
      <label>{{ _('Описание') }}</label>
      <textarea name="description" rows="3"></textarea>
    </div>
    <div class="field">
      <label>{{ _('Дата начала') }} *</label>
      <input type="date" name="started_on">
    </div>
  </div>
  <button class="ui primary button" type="submit">{{ _('Создать проект') }}</button>
  <a href="/projects" class="ui button">{{ _('Отмена') }}</a>
</form>
{% endblock %}
